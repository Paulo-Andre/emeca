<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background: white;
        padding: 40px;
        width: 360px;
        border-radius: 18px;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.2);
        text-align: center;
        animation: fadeIn 0.6s ease-in-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .container h2 {
        margin-bottom: 25px;
        color: #333;
      }

      .input-group {
        margin-bottom: 20px;
        text-align: left;
        position: relative;
      }

      .input-group label {
        font-size: 13px;
        color: #555;
        display: block;
        margin-bottom: 6px;
      }

      .form-control {
        width: 100%;
        padding: 12px 15px;
        border-radius: 10px;
        border: 1px solid #ccc;
        outline: none;
        transition: 0.3s;
        font-size: 14px;
      }

      .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 10px rgba(102, 126, 234, 0.4);
      }

      .toggle-password {
        position: absolute;
        right: 12px;
        top: 38px;
        cursor: pointer;
        font-size: 12px;
        color: #667eea;
        font-weight: 500;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
      }

      button:hover {
        opacity: 0.9;
        transform: translateY(-2px);
      }

      .error {
        color: red;
        font-size: 13px;
        margin-bottom: 10px;
      }

      .footer-text {
        margin-top: 18px;
        font-size: 13px;
        color: #666;
      }

      .footer-text a {
        color: #667eea;
        text-decoration: none;
        font-weight: 500;
      }

      .footer-text a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Entrar</h2>

      {% if form.errors %}
      <div class="error">Usuário ou senha inválidos.</div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}

        <div class="input-group">
          <label for="id_username">Usuário</label>
          <input
            type="text"
            name="username"
            id="id_username"
            class="form-control"
            required
          />
        </div>

        <div class="input-group">
          <label for="id_password">Senha</label>
          <input
            type="password"
            name="password"
            id="id_password"
            class="form-control"
            required
          />
          <span class="toggle-password" onclick="togglePassword()"
            >Mostrar</span
          >
        </div>

        <button type="submit">Entrar</button>
      </form>

      

    <script>
      function togglePassword() {
        const passwordField = document.getElementById("id_password");
        const toggleText = document.querySelector(".toggle-password");

        if (passwordField.type === "password") {
          passwordField.type = "text";
          toggleText.innerText = "Ocultar";
        } else {
          passwordField.type = "password";
          toggleText.innerText = "Mostrar";
        }
      }
    </script>
  </body>
</html>
